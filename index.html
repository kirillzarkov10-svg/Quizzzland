<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizLand Premium</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #141419;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Экраны игры */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            padding: 20px;
        }

        .screen.active {
            display: flex;
        }

        /* Главное меню */
        #menu-screen {
            background: linear-gradient(135deg, #1e1e24 0%, #141419 100%);
        }

        .game-title {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #3498db;
            text-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
        }

        .btn-menu {
            background: #3498db;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }

        .btn-menu:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.5);
            background: #2980b9;
        }

        /* Выбор уровней */
        #levels-screen {
            background: #1a1a22;
        }

        .levels-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .level-card {
            background: #2a2a35;
            width: 140px;
            height: 180px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid #333;
        }

        .level-card:hover {
            transform: scale(1.05);
            border-color: #3498db;
        }

        .level-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .level-card .num {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Игровой экран */
        #game-screen {
            background: #141419;
        }

        header {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .back-btn {
            background: none;
            border: 1px solid #444;
            color: #aaa;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        .back-btn:hover { color: #fff; border-color: #fff; }

        #score-board {
            font-size: 20px;
            background: #22222b;
            padding: 8px 15px;
            border-radius: 20px;
        }

        /* Игровая карта лабиринта */
        #map-container {
            background: #22222b;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #map {
            display: grid;
            gap: 8px;
        }

        .tile {
            background: #333344;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            user-select: none;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.3);
        }

        .tile:hover {
            background: #444458;
            transform: scale(1.05);
        }

        .tile.closed { color: transparent; background: #2a2a35; }
        .tile.opened { background: #3498db; color: white; cursor: default; transform: none; }
        .tile.solved { background: #2ecc71; color: white; cursor: default; transform: none; }

        /* Модальное окно вопроса */
        #quiz-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .modal-content {
            background: #22222b;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        /* Картинка к вопросу */
        .question-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 15px;
            background: #333;
        }

        #question-text {
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-option {
            background: #333344;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            text-align: left;
            padding-left: 15px;
        }

        .btn-option:hover { background: #444458; }
        .btn-option.wrong { background: #e74c3c !important; }

        /* Блок подсказок */
        .hints-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        .btn-hint {
            background: #f1c40f;
            color: #141419;
            border: none;
            padding: 8px 15px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-hint:hover:not(:disabled) { transform: translateY(-2px); background: #f39c12; }
        .btn-hint:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- 1. ГЛАВНОЕ МЕНЮ -->
    <div id="menu-screen" class="screen active">
        <h1 class="game-title">QuizzLand</h1>
        <button class="btn-menu" onclick="switchScreen('levels-screen')">Играть</button>
    </div>

    <!-- 2. ВЫБОР УРОВНЕЙ -->
    <div id="levels-screen" class="screen">
        <h1 style="margin-bottom: 20px;">Выберите уровень</h1>
        <div class="levels-container">
            <div class="level-card" onclick="startLevel(1, 4)">
                <div class="num">1</div>
                <div>Легкий (4х4)</div>
            </div>
            <div class="level-card" onclick="startLevel(2, 5)">
                <div class="num">2</div>
                <div>Средний (5х5)</div>
            </div>
            <div class="level-card locked">
                <div class="num">3</div>
                <div>Скоро...</div>
            </div>
        </div>
        <button class="back-btn" style="margin-top: 40px;" onclick="switchScreen('menu-screen')">Назад в меню</button>
    </div>

    <!-- 3. ИГРОВОЙ ЭКРАН -->
    <div id="game-screen" class="screen">
        <header>
            <button class="back-btn" onclick="switchScreen('levels-screen')">Выйти</button>
            <div id="score-board">Монеты: <span id="coins">50</span> 🪙</div>
        </header>

        <div id="map-container">
            <div id="map"></div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ВОПРОСА -->
    <div id="quiz-modal">
        <div class="modal-content">
            <img id="question-img" class="question-image" src="" alt="Иллюстрация к вопросу">
            <h3 id="question-text">Вопрос</h3>
            <div class="options-container" id="options"></div>
            
            <!-- Подсказки -->
            <div class="hints-container">
                <button id="hint-5050" class="btn-hint" onclick="useHint5050()">50/50 (20 🪙)</button>
                <button id="hint-skip" class="btn-hint" onclick="useHintSkip()">Пропустить (30 🪙)</button>
            </div>
        </div>
    </div>

    <script>
        // База вопросов с тематическими изображениями
        const questionsDatabase = [
            { q: "Какая планета Солнечной системы самая большая?", a: ["Сатурн", "Юпитер", "Нептун", "Земля"], correct: 1, img: "https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?w=500&q=80" },
            { q: "Какая страна является родиной пиццы?", a: ["Франция", "Испания", "Италия", "Греция"], correct: 2, img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500&q=80" },
            { q: "Что изображено на картине Леонардо да Винчи?", a: ["Мона Лиза", "Звездная ночь", "Крик", "Герника"], correct: 0, img: "https://images.unsplash.com/photo-1580136579312-94651dfd596d?w=500&q=80" },
            { q: "Какое животное является самым быстрым на суше?", a: ["Лев", "Гепард", "Антилопа", "Сапсан"], correct: 1, img: "https://images.unsplash.com/photo-1517849845537-4d257902454a?w=500&q=80" },
            { q: "Какой океан самый большой на Земле?", a: ["Атлантический", "Индийский", "Тихий", "Северный Ледовитый"], correct: 2, img: "https://images.unsplash.com/photo-1551244072-5d12893278ab?w=500&q=80" }
        ];

        let coins = 50; // Начинаем с балансом для проверки подсказок
        let currentTileIndex = null;
        let currentQuestion = null;

        // Переключение экранов
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Запуск конкретного уровня
        function startLevel(levelNum, size) {
            switchScreen('game-screen');
            const mapElement = document.getElementById('map');
            mapElement.innerHTML = '';
            
            // Динамически настраиваем размеры сетки лабиринта
            mapElement.style.gridTemplateColumns = `repeat(${size}, 75px)`;
            mapElement.style.gridTemplateRows = `repeat(${size}, 75px)`;

            for (let i = 0; i < size * size; i++) {
                const tile = document.createElement('div');
                tile.classList.add('tile', 'closed');
                tile.innerText = "?";
                tile.dataset.index = i;
                tile.addEventListener('click', () => handleTileClick(i, tile));
                mapElement.appendChild(tile);
            }
            updateUI();
        }

        function handleTileClick(index, tile) {
            if (tile.classList.contains('solved') || tile.classList.contains('opened')) return;

            currentTileIndex = index;
            tile.classList.remove('closed');
            tile.classList.add('opened');

            currentQuestion = questionsDatabase[Math.floor(Math.random() * questionsDatabase.length)];
            showQuestion(currentQuestion);
        }

        function showQuestion(questionData) {
            document.getElementById('question-img').src = questionData.img;
            document.getElementById('question-text').innerText = questionData.q;
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            // Восстанавливаем доступность кнопок подсказок
            document.getElementById('hint-5050').disabled = coins < 20;
            document.getElementById('hint-skip').disabled = coins < 30;

            questionData.a.forEach((option, idx) => {
                const btn = document.createElement('button');
                btn.classList.add('btn-option');
                btn.innerText = option;
                btn.dataset.idx = idx;
                btn.addEventListener('click', () => checkAnswer(idx, questionData.correct));
                optionsContainer.appendChild(btn);
            });

            document.getElementById('quiz-modal').style.display = 'flex';
        }

        function checkAnswer(selectedIdx, correctIdx) {
            document.getElementById('quiz-modal').style.display = 'none';
            const activeTile = document.querySelector(`.tile[data-index='${currentTileIndex}']`);

            if (selectedIdx === correctIdx) {
                activeTile.className = 'tile solved';
                activeTile.innerText = "✔️";
                coins += 15;
            } else {
                activeTile.className = 'tile closed';
                activeTile.innerText = "?";
            }
            updateUI();
        }

        // ПОДСКАЗКА: 50/50
        function useHint5050() {
            if (coins < 20) return;
            coins -= 20;
            updateUI();
            document.getElementById('hint-5050').disabled = true;

            const buttons = Array.from(document.querySelectorAll('.btn-option'));
            let wrongButtons = buttons.filter(btn => parseInt(btn.dataset.idx) !== currentQuestion.correct);
            
            // Случайно удаляем два неверных ответа
            wrongButtons.sort(() => Math.random() - 0.5);
            wrongButtons.slice(0, 2).forEach(btn => btn.style.visibility = 'hidden');
        }

        // ПОДСКАЗКА: Пропустить вопрос
        function useHintSkip() {
            if (coins < 30) return;
            coins -= 30;
            document.getElementById('quiz-modal').style.display = 'none';
            
            const activeTile = document.querySelector(`.tile[data-index='${currentTileIndex}']`);
            activeTile.className = 'tile solved';
            activeTile.innerText = "⭐";
            
            updateUI();
        }

        function updateUI() {
            document.getElementById('coins').innerText = coins;
        }
    </script>
</body>
</html>
